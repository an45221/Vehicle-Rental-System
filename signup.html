<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account - Go Rent</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-wrapper">

    <!-- Logo -->
    <div class="form-logo-box">
        <img src="images/smallcarlogo.png" class="form-logo-img">
        <h1 class="form-logo-text">GO <span>RENT</span>.</h1>
    </div>

    <!-- Signup Form -->
    <form method="POST" action="signup.php" id="signupForm" class="form">

        <label class="form-label">Full Name </label>
        <input type="text" class="form-input" id="fullname" name="fullname">
        <span class="error-msg" id="fullname-error"></span>

        <label class="form-label">Username </label>
        <input type="text" class="form-input" id="username" name="username">
        <span class="error-msg" id="username-error"></span>

        <label class="form-label">E-mail </label>
        <input type="email" class="form-input" id="email" name="email">
        <span class="error-msg" id="email-error"></span>

        <label class="form-label">Password </label>
        <input type="password" class="form-input" id="password" name="password">
        <span class="error-msg" id="password-error"></span>

        <label class="form-label">Confirm Password </label>
        <input type="password" class="form-input" id="confirmPassword" name="confirmPassword">
        <span class="error-msg" id="confirmPassword-error"></span>

        <div class="form-checkbox">
            <input type="checkbox" id="terms" name="terms">
            <p>By clicking Continue you agree to our Terms and Privacy Notice.</p>
            <span class="error-msg" id="terms-error"></span>
        </div>

        <button type="submit" class="form-btn">Sign Up</button>
    </form>

    <p class="form-create-text">
        Already have an account?
        <a href="login.html" class="form-link">Login</a>
    </p>

</div>

<!-- ======================
     VALIDATION SCRIPT
====================== -->
<script>
document.getElementById("signupForm").addEventListener("submit", function (event) {
    event.preventDefault();
    let isValid = true;

    /* ======================
       REGEX PATTERNS
    ====================== */
    const startsWithLetter = /^[A-Za-z]/;
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    /* ======================
       INPUT ELEMENTS
    ====================== */
    const fullname = document.getElementById("fullname");
    const username = document.getElementById("username");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const terms = document.getElementById("terms");

    /* ======================
       CLEAR PREVIOUS ERRORS
    ====================== */
    document.querySelectorAll(".error-msg").forEach(el => el.textContent = "");
    document.querySelectorAll(".form-input").forEach(el => el.classList.remove("error"));

    /* ======================
       FULL NAME
    ====================== */
    if (fullname.value.trim().length < 6) {
        showError("fullname", "Full name must be at least 6 characters.");
        isValid = false;
    } 
    else if (!startsWithLetter.test(fullname.value.trim())) {
        showError("fullname", "Full name must start with a letter.");
        isValid = false;
    }

    /* ======================
       USERNAME
    ====================== */
    if (username.value.trim().length < 3) {
        showError("username", "Username must be at least 3 characters.");
        isValid = false;
    } 
    else if (!startsWithLetter.test(username.value.trim())) {
        showError("username", "Username must start with a letter.");
        isValid = false;
    }

    /* ======================
       EMAIL
    ====================== */
    if (!startsWithLetter.test(email.value.trim())) {
        showError("email", "Email must start with a letter.");
        isValid = false;
    } 
    else if (!emailPattern.test(email.value.trim())) {
        showError("email", "Enter a valid email address.");
        isValid = false;
    }

    /* ======================
       PASSWORD
    ====================== */
    if (
        password.value.length < 8 ||
        !/[A-Z]/.test(password.value) ||
        !/[a-z]/.test(password.value) ||
        !/[0-9]/.test(password.value) ||
        !/[!@#$%^&*]/.test(password.value)
    ) {
        showError(
            "password",
            "Password must be at least 8 characters and include uppercase, lowercase, number, and special character."
        );
        isValid = false;
    }

    /* ======================
       CONFIRM PASSWORD
    ====================== */
    if (password.value !== confirmPassword.value) {
        showError("confirmPassword", "Passwords do not match.");
        isValid = false;
    }

    /* ======================
       TERMS
    ====================== */
    if (!terms.checked) {
        document.getElementById("terms-error").textContent = "You must agree to the terms.";
        isValid = false;
    }

    /* ======================
       SUBMIT FORM
    ====================== */
    if (isValid) {
        this.submit(); // send to signup.php (PHP backend)
    }

    /* ======================
       HELPER FUNCTION
    ====================== */
    function showError(fieldId, message) {
        document.getElementById(fieldId + "-error").textContent = message;
        document.getElementById(fieldId).classList.add("error");
    }
});
</script>

</body>
</html>
