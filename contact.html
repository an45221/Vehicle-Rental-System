<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Bar Improved</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fafafa;
    }

    .contact-bar {
      background: #fff;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.07);
      border-radius: 12px;
    }

    .contact-text p {
      font-size: 16px;
      color: #444;
      margin: 0;
      max-width: 350px;
    }

    .contact-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .support-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .call-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-weight: 600;
      color: #222;
      text-align: right;
    }

    .call-info h4 {
      margin: 0;
      font-size: 18px;
      color: #ff8c00; /* warm orange accent */
    }

    .call-info span {
      font-size: 16px;
    }

    .whatsapp-icon img {
      width: 38px;
      height: 38px;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .whatsapp-icon img:hover {
      transform: scale(1.2);
    }

    /* Responsive */
    @media (max-width: 520px) {
      .contact-bar {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .contact-right {
        justify-content: center;
        text-align: center;
      }
      .call-info {
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <section class="contact-bar">
    <div class="contact-text">
      <p>Call us for further information. Customer care is here to help you anytime.</p>
    </div>

    <div class="contact-right">
      <img src="images/whatsapp.png" class="support-icon" alt="Support" />

      <div class="call-info">
        <h4>Call Us Now</h4>
        <span>+977-9819214732</span>
      </div>

      <a href="https://wa.me/9819214732" class="whatsapp-icon" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp" />
      </a>
    </div>
  </section>

</body>
</html>
